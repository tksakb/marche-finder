<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#176b7a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="マルシェ検索">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>マルシェ出店先ファインダー</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/icon-180.png">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="topbar">
          <div>
            <p class="eyebrow">Saitama / Ibaraki / Tokyo / Chiba</p>
            <h1>マルシェ出店先ファインダー</h1>
          </div>
          <button id="searchButton" class="primary-button" type="button">
            <span class="button-icon" aria-hidden="true">⌕</span>
            探す
          </button>
        </div>

        <div class="status-row" aria-live="polite">
          <div id="statusText">対象地域の出店者募集情報を1クリックで収集します。</div>
          <div id="generatedAt" class="timestamp"></div>
        </div>
      </section>

      <section class="summary" id="summary" aria-label="検索サマリー">
        <div class="metric">
          <span class="metric-label">候補</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">募集中</span>
          <strong id="openCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">募集開始前</span>
          <strong id="upcomingCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">情報なし</span>
          <strong id="unknownCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Instagram</span>
          <strong id="instagramCount">0</strong>
        </div>
      </section>

      <section id="results" class="results" aria-label="検索結果"></section>
    </main>

    <template id="prefectureTemplate">
      <section class="prefecture-section">
        <div class="section-heading">
          <h2></h2>
          <span class="section-count"></span>
        </div>
        <div class="cards"></div>
      </section>
    </template>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-main">
          <div class="card-title-row">
            <h3></h3>
            <div class="badge-group">
              <span class="source-badge"></span>
              <span class="badge"></span>
            </div>
          </div>
          <dl class="details">
            <div>
              <dt>開催時期</dt>
              <dd class="period"></dd>
            </div>
            <div>
              <dt>出店費用</dt>
              <dd class="fee"></dd>
            </div>
          </dl>
          <p class="snippet"></p>
        </div>
        <a class="link-button" rel="noopener noreferrer">募集ページ</a>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
